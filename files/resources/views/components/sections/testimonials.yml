title: Testimonials
description: The grid of client quotes from collections/testimonials.json (the featured one is skipped)
fields:
    badge:
        type: text
        label: Badge
        default: "Client notes"
    heading:
        type: text
        label: Heading
        default: "The part we can't"
    headingAccent:
        type: text
        label: Heading accent
